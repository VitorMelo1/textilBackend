services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: textil
      POSTGRES_USER: textil
      POSTGRES_PASSWORD: textil
    ports:
      - "5432:5432"
    volumes:
      - textil_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U textil -d textil"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  core-api:
    build:
      context: .
      dockerfile: core-api/Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./shared:/app/shared
      - ./core-api/app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  chat-service:
    build:
      context: .
      dockerfile: chat-service/Dockerfile
    env_file:
      - .env
    ports:
      - "8001:8001"
    volumes:
      - ./shared:/app/shared
      - ./chat-service/app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  textil_pgdata:

